<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Job Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>💼 Mini Job Board</h1>

    <div class="form">
      <input id="jobTitle" placeholder="Job title (e.g. Web Developer)">
      <input id="company" placeholder="Company name">
      <button onclick="addJob()">Post Job</button>
    </div>

    <div id="jobList"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
